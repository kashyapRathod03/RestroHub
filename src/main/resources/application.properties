spring.application.name=restaurant

build.version=1.0.0

server.servlet.context-path=/
server.context-path=/

#Database Configuration

# ===============================
# = DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/RestroHub_DB
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# = JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8085

spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.idle-timeout=18000000
spring.datasource.hikari.minimum-idle=30
spring.datasource.hikari.connection-timeout=900000

server.servlet.session.timeout=1d


# Logback Configuration

# Root logger level
logging.level.root=info

# Logback Appender configuration for STDOUT
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level %logger{36} [%M:%L] - %msg%n
# Logback Appender - STDOUT
logging.appender.console.name=STDOUT
logging.appender.console.class=ch.qos.logback.core.ConsoleAppender
logging.appender.console.encoder.pattern=%d{yyyy-MM-dd HH:mm:ss} - %-5level %logger{36} [%M:%L] - %msg%n
