# ===============================
# Spring Application
# ===============================
spring.application.name=restroly-qrmenu
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

build.version=1.0.0

# ===============================
# = DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/RestrHub_DB
spring.datasource.username=postgres
spring.datasource.password=MySQL03@
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# = JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.idle-timeout=18000000
spring.datasource.hikari.minimum-idle=30
spring.datasource.hikari.connection-timeout=900000

server.servlet.session.timeout=1d

# ===============================
# Logging Configuration
# ===============================
# Root logger level
logging.level.root=info

# Logback Appender configuration for STDOUT
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level %logger{36} [%M:%L] - %msg%n
# Logback Appender - STDOUT
logging.appender.console.name=STDOUT
logging.appender.console.class=ch.qos.logback.core.ConsoleAppender
logging.appender.console.encoder.pattern=%d{yyyy-MM-dd HH:mm:ss} - %-5level %logger{36} [%M:%L] - %msg%n

logging.level.com.restroly=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# Jackson Configuration
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ===============================
# Server Configuration
# ===============================
server.port=${SERVER_PORT:8181}
server.servlet.context-path=/restroly
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.api-docs.path=/v3/api-docs

# ===============================
# API Metadata
# ===============================
api.version=v1
api.title=Restroly QR Menu API
api.description=Production-ready REST API for Restaurant Menu Management

api.contact.name=Restroly Team
api.contact.email=support@restroly.com
api.contact.url=https://restroly.com

api.license.name=Apache 2.0
api.license.url=https://www.apache.org/licenses/LICENSE-2.0

# ===============================
# Security / JWT
# ===============================
security.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
security.jwt.expiration=${JWT_EXPIRATION:86400000}
security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# Security / CORS
# ===============================
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
security.cors.allowed-headers=*
security.cors.max-age=3600

# ===============================
# Actuator
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
